server:
  port: ${SERVER_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /
      path-mapping:
        health: health
  endpoint:
    health:
      probes:
        enabled: true

spring:
  application:
    name: cart
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cart}
    username: ${SPRING_DATASOURCE_USERNAME:cart_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cart_password}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

cart:
  inventory:
    base-url: ${CART_INVENTORY_BASE_URL:http://localhost:8086}

